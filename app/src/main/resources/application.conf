ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = ["com.kotlinshop.ApplicationKt.module"]
  }
}

database {
  url = "jdbc:postgresql://localhost:5432/shopdb"
  url = ${?DB_URL}
  username = "shopuser"
  username = ${?DB_USER}
  password = "shoppassword"
  password = ${?DB_PASSWORD}
}

jwt {
  secret = "default-secret-change-in-production-32chars"
  secret = ${?JWT_SECRET}
  issuer = "kotlin-shop"
  audience = "kotlin-shop-users"
}

redis {
  host = "localhost"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  password = ${?REDIS_PASSWORD}
}

rabbitmq {
  host = "localhost"
  host = ${?RABBITMQ_HOST}
  port = 5672
  port = ${?RABBITMQ_PORT}
  username = "guest"
  username = ${?RABBITMQ_USER}
  password = "guest"
  password = ${?RABBITMQ_PASSWORD}
}
