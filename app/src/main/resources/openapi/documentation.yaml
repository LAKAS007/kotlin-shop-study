openapi: "3.0.3"
info:
  title: "Kotlin Shop API"
  version: "1.0.0"
  description: "REST API интернет-магазина. Регистрация пользователей, управление товарами, оформление заказов, статистика для администратора."

servers:
  - url: "http://localhost:8080"
    description: "Локальный сервер разработки"

tags:
  - name: "Authentication"
    description: "Регистрация и вход"
  - name: "Products"
    description: "Просмотр каталога товаров"
  - name: "Orders"
    description: "Оформление и управление заказами (требуется авторизация)"
  - name: "Admin"
    description: "Управление товарами и статистика (только для ADMIN)"

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT токен, полученный через /auth/login"

  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: "ivan_petrov"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "secret123"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "ivan@example.com"
        password:
          type: string
          format: password
          example: "secret123"

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjF9.abc123"

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "ivan_petrov"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        role:
          type: string
          enum:
            - USER
            - ADMIN
          example: "USER"

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Ноутбук Pro 15"
        description:
          type: string
          example: "Мощный ноутбук с 16 ГБ RAM и SSD 512 ГБ"
        price:
          type: number
          format: double
          example: 89999.99
        stock:
          type: integer
          example: 50
        createdAt:
          type: integer
          format: int64
          description: "Unix timestamp"
          example: 1700000000000
        updatedAt:
          type: integer
          format: int64
          description: "Unix timestamp"
          example: 1700000000000

    CreateProductRequest:
      type: object
      required:
        - name
        - description
        - price
        - stock
      properties:
        name:
          type: string
          example: "Ноутбук Pro 15"
        description:
          type: string
          example: "Мощный ноутбук с 16 ГБ RAM и SSD 512 ГБ"
        price:
          type: number
          format: double
          example: 89999.99
        stock:
          type: integer
          minimum: 0
          example: 50

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          example: "Ноутбук Pro 15 обновлённый"
        description:
          type: string
          example: "Обновлённое описание"
        price:
          type: number
          format: double
          example: 79999.99
        stock:
          type: integer
          minimum: 0
          example: 45

    OrderItemResponse:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        productName:
          type: string
          example: "Ноутбук Pro 15"
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: double
          example: 89999.99

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMED
            - CANCELLED
          example: "PENDING"
        totalAmount:
          type: number
          format: double
          example: 179999.98
        createdAt:
          type: integer
          format: int64
          description: "Unix timestamp"
          example: 1700000000000
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"

    CreateOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: integer
                example: 1
              quantity:
                type: integer
                minimum: 1
                example: 2

    StatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
          format: int64
          example: 150
        pendingOrders:
          type: integer
          format: int64
          example: 30
        confirmedOrders:
          type: integer
          format: int64
          example: 100
        cancelledOrders:
          type: integer
          format: int64
          example: 20
        totalRevenue:
          type: number
          format: double
          example: 154999.50
        totalProducts:
          type: integer
          example: 42
        totalUsers:
          type: integer
          format: int64
          example: 200

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Ресурс не найден"

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: "Регистрация пользователя"
      description: "Создаёт новый аккаунт с ролью USER."
      operationId: "registerUser"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              username: "ivan_petrov"
              email: "ivan@example.com"
              password: "secret123"
      responses:
        "201":
          description: "Пользователь успешно зарегистрирован"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: "Email или имя пользователя уже заняты"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Email уже зарегистрирован"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags:
        - Authentication
      summary: "Вход и получение JWT токена"
      description: "Аутентифицирует пользователя и возвращает JWT токен для последующих запросов."
      operationId: "loginUser"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "ivan@example.com"
              password: "secret123"
      responses:
        "200":
          description: "Вход выполнен успешно"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: "Неверный email или пароль"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Неверные учётные данные"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      tags:
        - Products
      summary: "Список всех товаров"
      description: "Возвращает список доступных товаров. Авторизация не требуется."
      operationId: "listProducts"
      responses:
        "200":
          description: "Список товаров"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      tags:
        - Products
      summary: "Получить товар по ID"
      description: "Возвращает один товар по его идентификатору. Авторизация не требуется."
      operationId: "getProductById"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Идентификатор товара"
          example: 1
      responses:
        "200":
          description: "Товар найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: "Товар не найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Товар не найден"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Admin
      summary: "Обновить товар (только ADMIN)"
      description: "Обновляет данные существующего товара. Требуется JWT токен с ролью ADMIN."
      operationId: "updateProduct"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Идентификатор товара"
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: "Товар успешно обновлён"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Недостаточно прав (требуется роль ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Товар не найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Admin
      summary: "Удалить товар (только ADMIN)"
      description: "Удаляет товар по ID. Требуется JWT токен с ролью ADMIN."
      operationId: "deleteProduct"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Идентификатор товара"
          example: 1
      responses:
        "204":
          description: "Товар успешно удалён"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Недостаточно прав (требуется роль ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Товар не найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    post:
      tags:
        - Orders
      summary: "Создать заказ"
      description: "Оформляет новый заказ для авторизованного пользователя. При создании списывается остаток со склада."
      operationId: "createOrder"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            example:
              items:
                - productId: 1
                  quantity: 2
                - productId: 3
                  quantity: 1
      responses:
        "201":
          description: "Заказ успешно создан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: "Недостаточно товара на складе"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Недостаточно товара на складе"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Товар не найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags:
        - Orders
      summary: "История заказов текущего пользователя"
      description: "Возвращает все заказы авторизованного пользователя."
      operationId: "listOrders"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Список заказов"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    delete:
      tags:
        - Orders
      summary: "Отменить заказ"
      description: "Отменяет заказ. Только владелец заказа может его отменить. После отмены остаток на складе восстанавливается."
      operationId: "cancelOrder"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: "Идентификатор заказа"
          example: 1
      responses:
        "200":
          description: "Заказ успешно отменён"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Нет доступа к этому заказу"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Заказ не найден"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/admin:
    post:
      tags:
        - Admin
      summary: "Добавить товар (только ADMIN)"
      description: "Создаёт новый товар в каталоге. Требуется JWT токен с ролью ADMIN."
      operationId: "createProduct"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              name: "Ноутбук Pro 15"
              description: "Мощный ноутбук с 16 ГБ RAM"
              price: 89999.99
              stock: 50
      responses:
        "201":
          description: "Товар успешно добавлен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Недостаточно прав (требуется роль ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/orders:
    get:
      tags:
        - Admin
      summary: "Статистика заказов (только ADMIN)"
      description: "Возвращает агрегированную статистику по заказам, товарам и пользователям."
      operationId: "getOrderStats"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Статистика получена"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "401":
          description: "Отсутствует или недействителен JWT токен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Недостаточно прав (требуется роль ADMIN)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Внутренняя ошибка сервера"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
